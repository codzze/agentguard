# AgentGuard Risk Classification Policies
# ─────────────────────────────────────────
# Each policy maps a tool pattern to a risk tier.
# Wildcards (*) match any suffix.
#
# Tiers:
#   LOW      → Auto-approve (no human needed)
#   MID      → Single-sig approval
#   HIGH     → Multi-sig approval (2+ reviewers)
#   CRITICAL → Cross-pool multi-sig with executive oversight

policies:
  # ─── LOW RISK ────────────────────────────
  - tool: "read_*"
    tier: LOW
    threshold: 0
    pools: []
    timeout: "5m"
    onRejection: notify_agent
    onTimeout: auto_deny
    autoApprove: true

  - tool: "list_*"
    tier: LOW
    threshold: 0
    pools: []
    timeout: "5m"
    onRejection: notify_agent
    onTimeout: auto_deny
    autoApprove: true

  - tool: "get_*"
    tier: LOW
    threshold: 0
    pools: []
    timeout: "5m"
    onRejection: notify_agent
    onTimeout: auto_deny
    autoApprove: true

  - tool: "search_*"
    tier: LOW
    threshold: 0
    pools: []
    timeout: "5m"
    onRejection: notify_agent
    onTimeout: auto_deny
    autoApprove: true

  # ─── MID RISK ───────────────────────────
  - tool: "update_*"
    tier: MID
    threshold: 1
    pools:
      - general
    timeout: "3m"
    onRejection: notify_agent
    onTimeout: auto_deny

  - tool: "create_*"
    tier: MID
    threshold: 1
    pools:
      - general
    timeout: "3m"
    onRejection: notify_agent
    onTimeout: auto_deny

  # ─── HIGH RISK ──────────────────────────
  - tool: "delete_*"
    tier: HIGH
    threshold: 2
    pools:
      - security
    timeout: "5m"
    onRejection: abort_agent
    onTimeout: escalate

  - tool: "apply_discount"
    tier: HIGH
    threshold: 2
    pools:
      - finance
    conditions:
      - field: "percentage"
        operator: ">"
        value: 15
    timeout: "5m"
    onRejection: notify_agent
    onTimeout: auto_deny

  - tool: "deploy_*"
    tier: HIGH
    threshold: 2
    pools:
      - engineering
      - security
    timeout: "5m"
    onRejection: abort_agent
    onTimeout: escalate

  # ─── CRITICAL RISK ─────────────────────
  - tool: "transfer_funds"
    tier: CRITICAL
    threshold: 3
    pools:
      - finance
      - security
      - legal
    conditions:
      - field: "amount"
        operator: ">"
        value: 10000
    timeout: "15m"
    onRejection: abort_agent
    onTimeout: escalate
    escalationPool: executive

  - tool: "delete_production_*"
    tier: CRITICAL
    threshold: 3
    pools:
      - engineering
      - security
      - executive
    timeout: "15m"
    onRejection: abort_agent
    onTimeout: escalate

  - tool: "modify_permissions"
    tier: CRITICAL
    threshold: 2
    pools:
      - security
      - executive
    timeout: "10m"
    onRejection: abort_agent
    onTimeout: escalate
