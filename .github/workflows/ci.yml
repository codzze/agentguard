name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-test-node:
    name: Node.js Lint & Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build shared-proto
        run: npm run build --workspace=packages/shared-proto

      - name: Build haas-core
        run: npm run build --workspace=packages/haas-core

      - name: Lint haas-core
        run: npm run lint --workspace=packages/haas-core

      - name: Test haas-core
        run: npm run test --workspace=packages/haas-core

  lint-and-test-python:
    name: Python Lint & Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12', '3.13']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Python SDK dependencies
        working-directory: packages/haas-python-sdk
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        working-directory: packages/haas-python-sdk
        run: ruff check .

      - name: Type check with mypy
        working-directory: packages/haas-python-sdk
        run: mypy agentguard/

      - name: Test with pytest
        working-directory: packages/haas-python-sdk
        run: pytest tests/ -v

  build-dashboard:
    name: Build Dashboard
    runs-on: ubuntu-latest
    needs: [lint-and-test-node]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build dashboard
        run: npm run build --workspace=packages/haas-dashboard
